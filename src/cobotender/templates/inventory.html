<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>재고관리</title>
  <link rel="stylesheet" href="/static/css/admin.css">
  <style>
    .page-shell{min-height:100vh;padding:26px;max-width:1500px;margin:0 auto}
    .page-nav{display:flex;gap:12px;align-items:center}
    .page-nav button,.save-btn{border:1px solid rgba(215,173,97,.35);border-radius:16px;background:rgba(255,255,255,.06);color:var(--cream);font-size:16px;font-weight:900;padding:14px 18px;cursor:pointer;transition:.18s}
    .page-nav button:hover,.save-btn:hover{transform:translateY(-2px);border-color:var(--gold);color:var(--gold2)}
    .inventory-panel{margin-top:22px}
    .inventory-grid{display:grid;grid-template-columns:repeat(3,minmax(260px,1fr));gap:18px}
    .stock-card{border:1px solid var(--line);border-radius:22px;background:rgba(0,0,0,.18);padding:22px;display:flex;flex-direction:column;gap:18px;min-height:190px}
    .stock-card h3{margin:0;font-size:24px;letter-spacing:-.03em}
    .stock-card p{margin:0;color:var(--muted);font-size:14px}
    .stock-control{margin-top:auto;display:grid;grid-template-columns:48px 1fr 48px 34px;gap:10px;align-items:center}
    .stock-control button{height:48px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.07);color:var(--cream);font-size:24px;font-weight:900;cursor:pointer}
    .stock-control input{height:48px;border:1px solid rgba(215,173,97,.35);border-radius:14px;background:#0d0906;color:var(--cream);font-size:22px;font-weight:900;text-align:center}
    .stock-control span{color:var(--gold2);font-weight:900}
    .stock-actions{display:flex;justify-content:flex-end;margin-top:22px}.save-btn{min-width:180px;background:linear-gradient(135deg,var(--gold2),var(--gold));color:#211506;border-color:transparent;font-size:20px}.toast{position:fixed;right:30px;bottom:30px;padding:16px 22px;border-radius:16px;background:rgba(20,15,10,.96);border:1px solid rgba(215,173,97,.35);box-shadow:var(--shadow);color:var(--gold2);font-weight:900;opacity:0;transform:translateY(12px);transition:.25s}.toast.show{opacity:1;transform:translateY(0)}
    input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}input[type="number"]{-moz-appearance:textfield;appearance:textfield}
    @media(max-width:1100px){.inventory-grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:720px){.page-shell{padding:16px}.admin-topbar{align-items:flex-start}.inventory-grid{grid-template-columns:1fr}.page-nav{width:100%;display:grid;grid-template-columns:1fr 1fr}.page-nav button{width:100%}}
  </style>
</head>
<body>
<section class="page-shell">
  <header class="admin-topbar">
    <div>
      <p class="eyebrow">INVENTORY MANAGEMENT</p>
      <h1>재고관리</h1>
    </div>
    <div class="page-nav">
      <button onclick="location.href='/admin/dashboard'">대시보드</button>
      <button onclick="location.href='/admin/orders'">주문 내역</button>
    </div>
  </header>

  <section class="panel inventory-panel">
    <div class="panel-head">
      <p class="eyebrow">WHISKY STOCK</p>
      <h2>위스키 병 수 입력</h2>
    </div>

    <div id="inventoryGrid" class="inventory-grid"></div>

    <div class="stock-actions">
      <button class="save-btn" onclick="saveInventory()">저장</button>
    </div>
  </section>
</section>
<div id="toast" class="toast">저장되었습니다.</div>

<script>
let inventoryItems = [];

function showToast(text){
  const toast = document.getElementById('toast');
  toast.textContent = text;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}

function changeBottle(id, delta){
  const input = document.getElementById('bottle' + id);
  input.value = Math.max(0, Number(input.value || 0) + delta);
}

async function loadInventory(){
  const res = await fetch('/api/inventory');
  inventoryItems = await res.json();
  const grid = document.getElementById('inventoryGrid');

  grid.innerHTML = inventoryItems.map(item => {
    const bottles = Math.floor(Number(item.stock_ml || 0) / Number(item.bottle_ml || 1));
    return `
      <div class="stock-card">
        <div>
          <h3>${item.name}</h3>
          <p>${Number(item.bottle_ml).toLocaleString('ko-KR')}ml / 1병</p>
        </div>
        <div class="stock-control">
          <button onclick="changeBottle(${item.id}, -1)">-</button>
          <input id="bottle${item.id}" type="number" min="0" value="${bottles}">
          <button onclick="changeBottle(${item.id}, 1)">+</button>
          <span>병</span>
        </div>
      </div>`;
  }).join('');
}

async function saveInventory(){
  const items = inventoryItems.map(item => ({
    id:item.id,
    bottles:Number(document.getElementById('bottle' + item.id).value || 0)
  }));

  const res = await fetch('/api/inventory', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({items})
  });

  const data = await res.json();
  if (data.ok){
    showToast('재고 정보가 저장되었습니다.');
    loadInventory();
  }else{
    showToast('저장에 실패했습니다.');
  }
}

loadInventory();
</script>
</body>
</html>
